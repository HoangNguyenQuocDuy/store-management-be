<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
<body style="margin:0; padding:0; background-color:#f0f0f0; font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f0f0f0; padding:30px 0;">
    <tr><td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:10px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
        <tr>
          <td th:style="'background: #1ba44c; padding:24px 32px; text-align:center;'">
            <h1 style="color:white; margin:0; font-size:28px; letter-spacing:2px;" th:text="${storeName}">QD Store</h1>
            <p style="color:rgba(255,255,255,0.85); margin:6px 0 0; font-size:14px;">Cập nhật trạng thái đơn hàng</p>
          </td>
        </tr>
        <tr>
          <td style="padding:32px; color:#333; font-size:15px; line-height:1.6;">
            <p>Xin chào <strong th:text="${userFullName}">Khách hàng</strong>,</p>
            <p>Đơn hàng <strong>#<span th:text="${orderId}">0</span></strong> của bạn vừa được cập nhật trạng thái.</p>

            <div th:style="'margin:24px 0; padding:16px; background:' + ${statusBg} + '; border-radius:8px; border-left:4px solid ' + ${statusColor}">
              <table style="width:100%; border-collapse:collapse;">
                <tr>
                  <td th:style="'color:' + ${previousStatusColor} + '; font-size:14px;'" th:text="${previousStatusLabel}">Trạng thái cũ</td>
                  <td style="font-size:20px; color:#ccc; text-align:center; width:40px;">→</td>
                  <td th:style="'font-weight:bold; font-size:16px; color:' + ${statusColor}"
                      th:text="${statusLabel}">Trạng thái mới</td>
                </tr>
              </table>
            </div>

            <p><strong>Địa chỉ giao hàng:</strong> <span th:text="${shippingAddress}">Địa chỉ</span></p>
            <p><strong>Tổng tiền:</strong>
              <span th:style="'color:' + ${brandGreen} + '; font-weight:bold;'" th:text="${totalAmount}">0đ</span>
            </p>
          </td>
        </tr>
        <tr>
          <td style="background:#333; padding:16px 32px; text-align:center;">
            <p style="color:#aaa; margin:0; font-size:12px;">
              © 2026 <span th:text="${storeName}">QD Store</span>. Cảm ơn bạn đã tin tưởng và mua hàng!
            </p>
          </td>
        </tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
